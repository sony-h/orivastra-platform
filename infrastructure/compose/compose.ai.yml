# ──────────────────────────────────────────────
# Orivastra — AI Services Compose
# ──────────────────────────────────────────────
# Orchestrates AI agents and automation services.
# Runs alongside the production stack on the
# shared orivastra network.
#
# Services:
#   hermes     AI DevOps agent that manages
#              infrastructure via trusted scripts.
#
#   openclaw   (Future) AI agent for code and
#              workflow automation.
#
# Usage:
#   # Start alongside production:
#   docker compose -f infrastructure/compose/compose.prod.yml \
#                  -f infrastructure/compose/compose.ai.yml up -d
#
#   # AI services only:
#   docker compose -f infrastructure/compose/compose.ai.yml up -d
# ──────────────────────────────────────────────

include:
  - compose.base.yml

services:
  # ── Hermes — AI DevOps Agent ────────────────
  hermes:
    build:
      context: ../..
      dockerfile: infrastructure/dockerfiles/hermes.Dockerfile
      target: hermes-prod
    container_name: orivastra-hermes
    restart: unless-stopped
    env_file:
      - ../env/.env
    environment:
      - NODE_ENV=production
      # Future: API keys for AI services
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
      # - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    volumes:
      - ../scripts:/app/infrastructure/scripts:ro
      # Future: Docker socket for container management
      # - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - orivastra

