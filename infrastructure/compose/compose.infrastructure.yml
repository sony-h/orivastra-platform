# ──────────────────────────────────────────────
# Orivastra — Infrastructure Compose
# ──────────────────────────────────────────────
# Runs infrastructure services that applications
# (frontend, backend) connect to as native processes.
#
# Applications are NOT containerized. They run
# on the host via PM2 (see ecosystem.config.js).
#
# Services:
#   postgres  Database for all application data
#   redis     Cache, session store, queue
#   adminer   Database GUI (dev only, via profile)
#
# Usage:
#   # Production (no Adminer):
#   docker compose -f compose.infrastructure.yml up -d
#
#   # Development (with Adminer):
#   docker compose -f compose.infrastructure.yml --profile dev up -d
# ──────────────────────────────────────────────

services:
  # ── PostgreSQL ──────────────────────────────
  postgres:
    image: postgres:17-alpine
    ports:
      - '5432:5432'
    env_file:
      - ../env/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-orivastra}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Redis ───────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'PING']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Adminer (Database GUI) ──────────────────
  adminer:
    image: adminer:latest
    profiles:
      - dev
    ports:
      - '8080:8080'
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
