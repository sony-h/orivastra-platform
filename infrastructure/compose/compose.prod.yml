# ──────────────────────────────────────────────
# Orivastra — Production Compose
# ──────────────────────────────────────────────
# Production deployment stack.
#
# Key differences from dev:
#   - No volume mounts for source code
#   - Uses prod target from Dockerfiles (optimized images)
#   - PostgreSQL and Redis NOT exposed publicly
#   - restart: unless-stopped on all services
#   - Health checks on critical services
#   - Secrets from .env file (never committed)
#
# Usage:
#   cp infrastructure/env/.env.production.example .env
#   # Edit .env with real secrets
#   docker compose -f infrastructure/compose/compose.prod.yml up -d
#
#   Rebuild:
#   docker compose -f infrastructure/compose/compose.prod.yml build --no-cache
#   docker compose -f infrastructure/compose/compose.prod.yml up -d
# ──────────────────────────────────────────────

services:
  # ── Frontend (Next.js) ──────────────────────
  frontend:
    build:
      context: ../..
      dockerfile: infrastructure/dockerfiles/frontend.Dockerfile
      target: frontend-prod
    ports:
      - '3000:3000'
    env_file:
      - ../env/.env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - orivastra

  # ── Backend (NestJS) ────────────────────────
  backend:
    build:
      context: ../..
      dockerfile: infrastructure/dockerfiles/backend.Dockerfile
      target: backend-prod
    ports:
      - '3001:3001'
    env_file:
      - ../env/.env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3001/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - orivastra

  # ── PostgreSQL ──────────────────────────────
  postgres:
    image: postgres:17-alpine
    # NOT exposed publicly — only accessible via internal Docker network
    expose:
      - '5432'
    env_file:
      - ../env/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-orivastra}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - orivastra

  # ── Redis ───────────────────────────────────
  redis:
    image: redis:7-alpine
    # NOT exposed publicly
    expose:
      - '6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'PING']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orivastra

  # ── Nginx ───────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - orivastra

volumes:
  postgres_data:
  redis_data:

networks:
  orivastra:
    driver: bridge
