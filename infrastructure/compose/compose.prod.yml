# ──────────────────────────────────────────────
# Orivastra — Production Compose
# ──────────────────────────────────────────────
# Production deployment stack.
#
# Key differences from dev:
#   - No volume mounts for source code
#   - Runners are minimal (node + app, non-root)
#   - PostgreSQL and Redis NOT exposed publicly
#   - restart: unless-stopped on all services
#   - Health checks with proper depends_on conditions
#   - Secrets from env_file (never committed)
#
# Usage:
#   cp infrastructure/env/.env.production.example infrastructure/env/.env
#   # Edit infrastructure/env/.env with real secrets
#   docker compose -f infrastructure/compose/compose.prod.yml up -d
# ──────────────────────────────────────────────

include:
  - compose.base.yml

services:
  # ── Frontend (Next.js) ──────────────────────
  frontend:
    build:
      context: ../..
      dockerfile: infrastructure/dockerfiles/frontend.Dockerfile
      target: runner
    ports:
      - '3000:3000'
    env_file:
      - ../env/.env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - orivastra

  # ── Backend (NestJS) ────────────────────────
  backend:
    build:
      context: ../..
      dockerfile: infrastructure/dockerfiles/backend.Dockerfile
      target: runner
    ports:
      - '3001:3001'
    env_file:
      - ../env/.env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - orivastra

  # ── PostgreSQL ──────────────────────────────
  postgres:
    image: postgres:17-alpine
    expose:
      - '5432'
    env_file:
      - ../env/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U orivastra']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - orivastra

  # ── Redis ───────────────────────────────────
  redis:
    image: redis:7-alpine
    expose:
      - '6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - orivastra

  # ── Nginx ───────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    networks:
      - orivastra
