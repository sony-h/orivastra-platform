version: "3.9"

services:
  frontend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile
      target: frontend-dev
    ports:
      - "3000:3000"
    volumes:
      - ../..:/app
      - /app/node_modules
      - /app/apps/frontend/.next
    environment:
      - NODE_ENV=development
    networks:
      - orivastra

  backend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.backend
    ports:
      - "3001:3001"
    volumes:
      - ../..:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - orivastra

  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: orivastra
      POSTGRES_PASSWORD: orivastra_dev
      POSTGRES_DB: orivastra
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orivastra"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - orivastra

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - orivastra

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - orivastra

volumes:
  postgres_data:
  redis_data:

networks:
  orivastra:
    driver: bridge
